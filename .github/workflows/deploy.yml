name: Deploy AAMAVASF

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy para VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pgsql, pdo_pgsql, mbstring, xml, bcmath, gd
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Instalar dependências PHP
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências Node
        run: npm ci

      - name: Build assets (Vite)
        run: npm run build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: /var/www/aamavasf.com.br/deploy.sh

      - name: Notificar sucesso
        if: success()
        run: echo "✅ Deploy concluído em aamavasf.com.br"

      - name: Notificar falha
        if: failure()
        run: echo "❌ Deploy falhou. Verifique os logs acima."
