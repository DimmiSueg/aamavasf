name: Deploy AAMAVASF

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy para VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pgsql, pdo_pgsql, mbstring, xml, bcmath, gd
          coverage: none

      - name: Atualizar composer.lock e instalar dependências PHP
        run: |
          composer update --no-dev --optimize-autoloader --no-interaction --prefer-dist
          composer dump-autoload --optimize

      - name: Commit composer.lock atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add composer.lock
          git diff --staged --quiet || git commit -m "chore: atualizar composer.lock [skip ci]"
          git push || true

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências Node
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Build assets (Vite)
        run: npm run build

      - name: Configurar chave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -p ${{ secrets.VPS_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Preparar diretórios na VPS
        run: |
          ssh -i ~/.ssh/vps_key -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "mkdir -p /home/aamavasf.com.br/storage/{logs,app/public} && \
             mkdir -p /home/aamavasf.com.br/storage/framework/{cache,sessions,views,testing} && \
             mkdir -p /home/aamavasf.com.br/bootstrap/cache"

      - name: Enviar arquivos para VPS via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.env' --exclude='.git' --exclude='Assets_sources' --exclude='node_modules' --exclude='storage/logs' --exclude='storage/framework' --exclude='public_html'
          path: ./
          remote_path: /home/aamavasf.com.br
          remote_host: ${{ secrets.VPS_HOST }}
          remote_port: ${{ secrets.VPS_PORT }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Executar pós-deploy na VPS
        run: |
          ssh -i ~/.ssh/vps_key -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
          set -e
          cd /home/aamavasf.com.br
          rm -rf public_html
          ln -sf /home/aamavasf.com.br/public public_html
          /usr/local/lsws/lsphp83/bin/php artisan down --retry=15
          /usr/local/lsws/lsphp83/bin/php artisan migrate --force
          /usr/local/lsws/lsphp83/bin/php artisan optimize:clear
          /usr/local/lsws/lsphp83/bin/php artisan optimize
          /usr/local/lsws/lsphp83/bin/php artisan filament:assets
          /usr/local/lsws/lsphp83/bin/php artisan storage:link --force
          sudo /usr/local/lsws/bin/lswsctrl restart
          /usr/local/lsws/lsphp83/bin/php artisan up
          ENDSSH

      - name: Limpar chave SSH
        if: always()
        run: rm -f ~/.ssh/vps_key

      - name: Notificar sucesso
        if: success()
        run: echo "Deploy concluído em aamavasf.com.br"

      - name: Notificar falha
        if: failure()
        run: echo "Deploy falhou. Verifique os logs acima."
