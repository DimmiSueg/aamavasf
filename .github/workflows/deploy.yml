name: Deploy AAMAVASF

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy para VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pgsql, pdo_pgsql, mbstring, xml, bcmath, gd
          coverage: none

      - name: Atualizar composer.lock e instalar dependências PHP
        run: |
          composer update --no-dev --optimize-autoloader --no-interaction --prefer-dist
          composer dump-autoload --optimize

      - name: Commit composer.lock atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add composer.lock
          git diff --staged --quiet || git commit -m "chore: atualizar composer.lock [skip ci]"
          git push || true

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências Node
        run: npm ci

      - name: Build assets (Vite)
        run: npm run build

      - name: Enviar arquivos para VPS via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete --exclude='.env' --exclude='.git' --exclude='Assets_sources' --exclude='node_modules' --exclude='storage/logs' --exclude='storage/framework'
          path: ./
          remote_path: /var/www/aamavasf.com.br
          remote_host: ${{ secrets.VPS_HOST }}
          remote_port: ${{ secrets.VPS_PORT || 22 }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}

      - name: Executar pós-deploy na VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /var/www/aamavasf.com.br
            /usr/local/lsws/lsphp83/bin/php artisan down --retry=15
            /usr/local/lsws/lsphp83/bin/php artisan migrate --force
            /usr/local/lsws/lsphp83/bin/php artisan optimize:clear
            /usr/local/lsws/lsphp83/bin/php artisan optimize
            /usr/local/lsws/lsphp83/bin/php artisan storage:link --force
            sudo /usr/local/lsws/bin/lswsctrl restart
            /usr/local/lsws/lsphp83/bin/php artisan up

      - name: Notificar sucesso
        if: success()
        run: echo "✅ Deploy concluído em aamavasf.com.br"

      - name: Notificar falha
        if: failure()
        run: echo "❌ Deploy falhou. Verifique os logs acima."
